<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.screen { display: none; }
.active { display: block; }

.card {
  background: #203a43;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #00eaff;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.shake { animation: shake 0.3s; }
@keyframes shake {
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
</style>
</head>

<body>

<div id="menu" class="screen active">
  <div class="card">
    <h2>Game Hub</h2>
    <button onclick="show('guess')">Guess Number</button>
    <button onclick="show('merlin')">Merlin</button>
  </div>
</div>

<div id="guess" class="screen">
  <div class="card">
    <h2>Guess Number</h2>
    <input id="gInput" placeholder="1-100">
    <button onclick="checkGuess()">Try</button>
    <p id="gMsg"></p>
    <button onclick="show('menu')">Back</button>
  </div>
</div>

<div id="merlin" class="screen">
  <div class="card">
    <h2>Merlin</h2>
    <p id="mQ"></p>
    <input id="mInput">
    <button onclick="checkMerlin()">Check</button>
    <p id="mMsg"></p>
    <button onclick="show('menu')">Back</button>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* GUESS */
let number=Math.floor(Math.random()*100)+1;

function checkGuess(){
  let val=Number(document.getElementById("gInput").value);
  let msg=document.getElementById("gMsg");

  if(val===number){
    msg.innerText="Correct!";
    number=Math.floor(Math.random()*100)+1;
  }else if(val>number){
    msg.innerText="Too high";
  }else{
    msg.innerText="Too low";
  }
}

/* MERLIN */
let levels=[
 {q:"cat → ?",a:"tiger"},
 {q:"water → ?",a:"ice"},
 {q:"man → ?",a:"king"}
];

let level=0;

function update(){
  document.getElementById("mQ").innerText=levels[level].q;
}

function checkMerlin(){
  let val=document.getElementById("mInput").value.toLowerCase();
  let msg=document.getElementById("mMsg");

  if(val===levels[level].a){
    level++;
    if(level>=levels.length){
      msg.innerText="Finished!";
      level=0;
    }else{
      msg.innerText="Correct!";
    }
  }else{
    msg.innerText="Wrong!";
  }

  document.getElementById("mInput").value="";
  update();
}

update();
</script>

</body>
</html>
