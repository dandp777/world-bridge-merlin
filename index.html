<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* screens */
.screen { display: none; }
.active { display: block; }

/* card modern */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* titluri */
h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

h2 {
  font-size: 20px;
}

/* input */
input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* butoane */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: linear-gradient(45deg,#00eaff,#00bfff);
  color: black;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #00eaff;
}

/* efecte */
.shake { animation: shake 0.3s; }
@keyframes shake {
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.win { animation: glow 1s infinite; }
@keyframes glow {
  50% { box-shadow: 0 0 20px #00eaff; }
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="card">
    <h1>🎮 Game Hub</h1>
    <button onclick="show('guess')">Guess Number</button>
    <button onclick="show('merlin')">Merlin</button>
  </div>
</div>

<!-- GUESS -->
<div id="guess" class="screen">
  <div class="card">
    <h2>Guess Number</h2>
    <input id="gInput" placeholder="1-100">
    <button onclick="checkGuess()">Try</button>
    <p id="gMsg"></p>
    <p id="gScore"></p>
    <button onclick="show('menu')">Back</button>
  </div>
</div>

<!-- MERLIN -->
<div id="merlin" class="screen">
  <div class="card">
    <h2>🧙 Merlin</h2>
    <p id="mQuestion"></p>
    <input id="mInput" placeholder="Answer...">
    <button onclick="checkMerlin()">Check</button>
    <p id="mMsg"></p>
    <p id="mScore"></p>
    <button onclick="show('menu')">Back</button>
  </div>
</div>

<script>

/* NAV */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* GUESS */
let number = Math.floor(Math.random()*100)+1;
let gScore = 0;

function checkGuess(){
  let val = Number(document.getElementById("gInput").value);
  let msg = document.getElementById("gMsg");

  if(val===number){
    msg.innerText="🎉 Correct!";
    gScore+=5;
    number=Math.floor(Math.random()*100)+1;
  }else if(val>number){
    msg.innerText="📉 Too high";
    gScore--;
  }else{
    msg.innerText="📈 Too low";
    gScore--;
  }

  document.getElementById("gScore").innerText="Score: "+gScore;
}

/* MERLIN */
let levels=[
 {q:"cat → ?",a:"tiger"},
 {q:"water → ?",a:"ice"},
 {q:"man → ?",a:"king"}
];

let level=0;
let score=Number(localStorage.getItem("score"))||0;

function updateMerlin(){
  document.getElementById("mQuestion").innerText=levels[level].q;

  let high=localStorage.getItem("high")||0;
  if(score>high){
    localStorage.setItem("high",score);
    high=score;
  }

  document.getElementById("mScore").innerText=
    "Level: "+(level+1)+"/"+levels.length+
    " | Score: "+score+
    " | High: "+high;
}

function checkMerlin(){
  let val=document.getElementById("mInput").value.toLowerCase();
  let msg=document.getElementById("mMsg");
  let card=document.querySelector("#merlin .card");

  if(val===levels[level].a){
    score+=10;
    localStorage.setItem("score",score);
    level++;

    if(level>=levels.length){
      msg.innerText="🏆 Finished!";
      card.classList.add("win");

      setTimeout(()=>{
        level=0;
        card.classList.remove("win");
        updateMerlin();
      },2000);
    }else{
      msg.innerText="🔥 Correct!";
    }
  }else{
    score-=5;
    localStorage.setItem("score",score);
    msg.innerText="❌ Wrong!";
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),300);
  }

  document.getElementById("mInput").value="";
  updateMerlin();
}

updateMerlin();

</script>

</body>
</html>
