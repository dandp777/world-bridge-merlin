<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen { display: none; }
.active { display: block; }

.card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  cursor: pointer;
  margin: 5px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 10px #00eaff;
}

input {
  padding: 10px;
  width: 180px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="card">
    <h2>🎮 Game Hub</h2>
    <button onclick="show('guess')">Guess Number</button>
    <button onclick="show('merlin')">Merlin</button>
  </div>
</div>

<!-- GUESS -->
<div id="guess" class="screen">
  <div class="card">
    <h2>🔢 Guess Number</h2>
    <input id="gInput" placeholder="1-100">
    <br>
    <button onclick="checkGuess()">Try</button>
    <p id="gMsg"></p>
    <button onclick="back()">⬅ Back</button>
  </div>
</div>

<!-- MERLIN -->
<div id="merlin" class="screen">
  <div class="card">
    <h2>🧙 Merlin</h2>

    <p id="mLevel"></p>
    <p id="mWord"></p>

    <input id="mInput" placeholder="Guess evolution">
    <br>

    <button onclick="checkMerlin()">Check</button>

    <p id="mMsg"></p>
    <p id="mScore"></p>

    <button onclick="back()">⬅ Back</button>
  </div>
</div>

<!-- SUNETE -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>

/* NAV */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function back() {
  show("menu");
}

/* GUESS GAME */
let number = Math.floor(Math.random() * 100) + 1;

function checkGuess() {
  let val = Number(document.getElementById("gInput").value);
  let msg = document.getElementById("gMsg");

  if (val === number) {
    msg.innerText = "🔥 Correct!";
    document.getElementById("winSound").play();
    number = Math.floor(Math.random() * 100) + 1;
  } else if (val < number) {
    msg.innerText = "⬆ Too small";
    document.getElementById("wrongSound").play();
  } else {
    msg.innerText = "⬇ Too big";
    document.getElementById("wrongSound").play();
  }
}

/* MERLIN PRO */
let merlinLevels = [
  { word: "cat", answer: "lion" },
  { word: "lion", answer: "dragon" },
  { word: "dragon", answer: "god" }
];

let currentLevel = 0;
let score = localStorage.getItem("score") || 0;

function updateMerlin() {
  document.getElementById("mLevel").innerText =
    "Level: " + (currentLevel + 1) + "/" + merlinLevels.length;

  document.getElementById("mWord").innerText =
    merlinLevels[currentLevel].word + " → ?";

  document.getElementById("mScore").innerText =
    "Score: " + score;
}

function checkMerlin() {
  let val = document.getElementById("mInput").value.toLowerCase();
  let msg = document.getElementById("mMsg");

  if (val === merlinLevels[currentLevel].answer) {
    score = Number(score) + 10;
    localStorage.setItem("score", score);
    document.getElementById("correctSound").play();

    currentLevel++;

    if (currentLevel >= merlinLevels.length) {
      document.getElementById("winSound").play();
      msg.innerText = "🏆 AI TERMINAT!";
      currentLevel = 0;
    } else {
      msg.innerText = "🔥 Corect!";
    }

  } else {
    score = Number(score) - 5;
    localStorage.setItem("score", score);
    document.getElementById("wrongSound").play();
    msg.innerText = "❌ Greșit!";
  }

  document.getElementById("mInput").value = "";
  updateMerlin();
}

/* INIT */
updateMerlin();

</script>

</body>
</html>
