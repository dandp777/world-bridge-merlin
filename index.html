<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:#203a43;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}

button,input {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button {
  background:#00eaff;
  cursor:pointer;
}

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
  margin:10px 0;
}

.bar {
  height:100%;
  background:#00eaff;
  width:0%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Merlin PRO</h2>

<p id="levelText"></p>
<p id="question"></p>

<div class="progress">
  <div id="bar" class="bar"></div>
</div>

<input id="input" placeholder="Scrie răspuns">
<button onclick="check()">Check</button>

<p id="msg"></p>
<p id="score"></p>

<button onclick="restart()">Restart</button>

</div>

<script>

let allLevels = [
 {q:"baby → adult → ?", a:"old"},
 {q:"seed → plant → ?", a:"tree"},
 {q:"day → night → ?", a:"day"},
 {q:"water → ice → ?", a:"steam"},
 {q:"student → job → ?", a:"money"},
 {q:"cold → warm → ?", a:"hot"},
 {q:"small → medium → ?", a:"large"},
 {q:"morning → noon → ?", a:"evening"},
 {q:"boy → man → ?", a:"father"},
 {q:"rain → cloud → ?", a:"storm"}
];

let levels = [];
let level = 0;
let score = 0;

function shuffle(){
  levels = [...allLevels].sort(()=>Math.random()-0.5).slice(0,5);
}

function update(){
  document.getElementById("question").innerText = levels[level].q;
  document.getElementById("levelText").innerText =
    "Level " + (level+1) + " / " + levels.length;

  document.getElementById("score").innerText = "Score: " + score;

  let percent = (level / levels.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function check(){
  let val = document.getElementById("input").value.toLowerCase().trim();
  let correct = levels[level].a;
  let msg = document.getElementById("msg");

  if(val === correct){
    msg.innerText = "🔥 Corect!";
    score++;
    level++;

    if(level >= levels.length){
      msg.innerText = "🏆 Ai câștigat! Scor: " + score;
      return;
    }

  } else if(correct.includes(val) || val.includes(correct)){
    msg.innerText = "🤏 Aproape!";
  } else {
    msg.innerText = "❌ Greșit!";
  }

  document.getElementById("input").value="";
  update();
}

function restart(){
  level = 0;
  score = 0;
  shuffle();
  update();
  document.getElementById("msg").innerText="";
}

shuffle();
update();

</script>

</body>
</html>
