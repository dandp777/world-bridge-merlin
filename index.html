<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* screens */
.screen { display: none; }
.active { display: block; }

/* card */
.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* buttons */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  color: black;
  cursor: pointer;
  margin: 5px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

/* effects */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  100% { transform: translateX(0); }
}
.shake { animation: shake 0.3s; }

@keyframes winGlow {
  0% { box-shadow: 0 0 5px #00eaff; }
  50% { box-shadow: 0 0 20px #00eaff; }
  100% { box-shadow: 0 0 5px #00eaff; }
}
.win { animation: winGlow 1s infinite; }

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="card">
    <h1>🎮 Game Hub</h1>
    <button onclick="show('guess')">Guess Number</button>
    <button onclick="show('merlin')">Merlin</button>
  </div>
</div>

<!-- GUESS NUMBER -->
<div id="guess" class="screen">
  <div class="card">
    <h2>Guess Number (1-100)</h2>
    <input id="gInput">
    <button onclick="checkGuess()">Try</button>
    <p id="gMsg"></p>
    <button onclick="show('menu')">⬅ Back</button>
  </div>
</div>

<!-- MERLIN -->
<div id="merlin" class="screen">
  <div class="card">
    <h2>🧙 Merlin</h2>

    <p id="mQuestion"></p>

    <input id="mInput" placeholder="Type answer...">
    <br>
    <button onclick="checkMerlin()">Check</button>

    <p id="mMsg"></p>
    <p id="mScore"></p>

    <button onclick="show('menu')">⬅ Back</button>
  </div>
</div>

<script>

/* navigation */
function show(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

/* ================= GUESS NUMBER ================= */
let number = Math.floor(Math.random() * 100) + 1;

function checkGuess() {
  let val = Number(document.getElementById("gInput").value);
  let msg = document.getElementById("gMsg");

  if (val === number) {
    msg.innerText = "🎉 Correct!";
    number = Math.floor(Math.random() * 100) + 1;
  } else if (val > number) {
    msg.innerText = "📉 Too high";
  } else {
    msg.innerText = "📈 Too low";
  }
}

/* ================= MERLIN ================= */

let merlinLevels = [
  { q: "cat → ?", a: "tiger" },
  { q: "water → ?", a: "ice" },
  { q: "man → ?", a: "king" }
];

let currentLevel = 0;
let score = Number(localStorage.getItem("score")) || 0;

function updateMerlin() {
  document.getElementById("mQuestion").innerText =
    merlinLevels[currentLevel].q;

  let high = localStorage.getItem("high") || 0;

  if (score > high) {
    localStorage.setItem("high", score);
    high = score;
  }

  document.getElementById("mScore").innerText =
    "Score: " + score + " | High: " + high;
}

function checkMerlin() {
  let val = document.getElementById("mInput").value.toLowerCase();
  let msg = document.getElementById("mMsg");
  let card = document.querySelector("#merlin .card");

  if (val === merlinLevels[currentLevel].a) {
    score += 10;
    localStorage.setItem("score", score);

    currentLevel++;

    if (currentLevel >= merlinLevels.length) {
      msg.innerText = "🏆 You finished!";
      card.classList.add("win");

      setTimeout(() => {
        currentLevel = 0;
        card.classList.remove("win");
        updateMerlin();
      }, 2000);

    } else {
      msg.innerText = "🔥 Correct!";
    }

  } else {
    score -= 5;
    localStorage.setItem("score", score);

    msg.innerText = "❌ Wrong!";
    card.classList.add("shake");

    setTimeout(() => {
      card.classList.remove("shake");
    }, 300);
  }

  document.getElementById("mInput").value = "";
  updateMerlin();
}

/* init */
updateMerlin();

</script>

</body>
</html>
