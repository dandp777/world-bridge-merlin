<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>World Bridge Merlin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 340px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #00eaff;
    cursor: pointer;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
}

.progress {
    height: 10px;
    background: #333;
    border-radius: 10px;
    margin: 10px 0;
    overflow: hidden;
}

.bar {
    height: 100%;
    background: #00eaff;
    width: 0%;
}
</style>
</head>

<body>

<div class="game">
    <h1>🧙 Merlin</h1>

    <button onclick="setLang('ro')">RO</button>
    <button onclick="setLang('en')">EN</button>

    <div id="era"></div>
    <div id="merlin"></div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div id="path"></div>
    <div id="score"></div>

    <input id="inputBox" placeholder="Scrie..." />

    <br>
    <button onclick="restartGame()">Restart</button>
</div>

<script>
const inputBox = document.getElementById("inputBox");

let lang = "ro";

const texts = {
    ro: {
guess: "🔮 Ghici evoluția...",
        placeholder: "Scrie cuvânt...",
        correct: "🔥 Corect!",
        wrong: "❌ Greșit!"
    },
    en: {
    guess: "🔮 Guess the evolution...",
        placeholder: "Type word...",
        correct: "🔥 Correct!",
        wrong: "❌ Wrong!"
    }
};

let levels = [
    {
        era: "Ancient",
        words: ["fire", "smoke", "magic"]
    },
    {
        era: "Medieval",
        words: ["magic", "alchemy", "machine"]
    },
    {
        era: "Modern",
        words: ["machine", "computer", "ai"]
    }
];

let currentLevel = 0;
let step = 0;
let score = 0;

function updateUI(){
    document.getElementById("era").innerText =
        "Era: " + levels[currentLevel].era;

    document.getElementById("merlin").innerText =
        texts[lang].guess;

    document.getElementById("path").innerText =
        "Progress: " + step + "/" + levels[currentLevel].words.length;

    document.getElementById("score").innerText =
        "Score: " + score;

    document.getElementById("bar").style.width =
        (step / levels[currentLevel].words.length * 100) + "%";

    inputBox.placeholder = texts[lang].placeholder;
}

function setLang(l){
    lang = l;
    updateUI();
}

updateUI();

inputBox.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let value = inputBox.value.toLowerCase();
        let correct = levels[currentLevel].words[step];

        if(value === correct){
            score += 10;
            step++;

            if(step >= levels[currentLevel].words.length){
                currentLevel++;
                step = 0;

                if(currentLevel >= levels.length){
                    document.getElementById("merlin").innerText =
                        "🚀 Ai ajuns în viitor!";
                    inputBox.disabled = true;
                    return;
                }
            }

        } else {
            document.getElementById("merlin").innerText =
                texts[lang].wrong;
        }

        localStorage.setItem("merlinSave", JSON.stringify({
            level: currentLevel,
            step: step,
            score: score
        }));

        updateUI();
        inputBox.value = "";
    }
});

function restartGame(){
    localStorage.removeItem("merlinSave");
    location.reload();
}

// LOAD SAVE
let save = JSON.parse(localStorage.getItem("merlinSave"));
if(save){
    currentLevel = save.level;
    step = save.step;
    score = save.score;
    updateUI();
}
</script>

</body>
</html>
