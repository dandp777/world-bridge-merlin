<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>World Bridge Merlin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    width: 350px;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(0,255,255,0.6);
}

.correct { animation: glow 0.5s; }
.wrong { animation: shake 0.3s; }

@keyframes glow {
    from { box-shadow: 0 0 0px green; }
    to { box-shadow: 0 0 20px green; }
}
