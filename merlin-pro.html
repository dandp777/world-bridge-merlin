<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>World Bridge Merlin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    width: 350px;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(0,255,255,0.6);
}

.correct { animation: glow 0.5s; }
.wrong { animation: shake 0.3s; }

@keyframes glow {
    from { box-shadow: 0 0 0px green; }
    to { box-shadow: 0 0 20px green; }
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00eaff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="game">
    <h1>🧙 Merlin</h1>
    <div id="era"></div>
    <div id="merlin"></div>
    <div id="path"></div>
    <div id="score">Score: 0</div>

    <input id="inputBox" placeholder="Scrie cuvânt..." />
    <br>
    <button onclick="restartGame()">Restart</button>
</div>

<script>
const inputBox = document.getElementById("inputBox");

const successSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const failSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

let levels = [
    { era: "Ancient", words: ["fire","smoke","magic"], hint: "🔥 Gândește evoluția..." },
    { era: "Medieval", words: ["magic","alchemy","machine"], hint: "⚔️ Din magie spre știință..." },
    { era: "Modern", words: ["machine","computer","ai"], hint: "💻 Te apropii de viitor..." }
];

let currentLevel = 0;
let step = 0;
let score = 0;

// Load progres
if(localStorage.getItem("merlinSave")){
    let save = JSON.parse(localStorage.getItem("merlinSave"));
    currentLevel = save.level;
    step = save.step;
    score = save.score;
}

function updateUI(){
    document.getElementById("era").innerText = "Era: " + levels[currentLevel].era;
    document.getElementById("merlin").innerText = "🧙 Merlin: " + levels[currentLevel].hint;
    document.getElementById("path").innerText = "Progress: " + step + "/" + levels[currentLevel].words.length;
    document.getElementById("score").innerText = "Score: " + score;
}

updateUI();

inputBox.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let value = inputBox.value.toLowerCase();
        let correctWord = levels[currentLevel].words[step];

        if(value === correctWord){
            successSound.play();

            score += 10;
            step++;

            document.querySelector(".game").classList.add("correct");
            setTimeout(() => {
                document.querySelector(".game").classList.remove("correct");
            }, 500);

            if(step >= levels[currentLevel].words.length){
                currentLevel++;
                step = 0;

                if(currentLevel >= levels.length){
                    document.getElementById("merlin").innerText = "🏆 Ai ajuns la AI!";
                    inputBox.disabled = true;
                    localStorage.removeItem("merlinSave");
                    return;
                }
            }

        } else {
            failSound.play();

            document.querySelector(".game").classList.add("wrong");
            setTimeout(() => {
                document.querySelector(".game").classList.remove("wrong");
            }, 300);

            document.getElementById("merlin").innerText =
                "❌ Greșit... " + levels[currentLevel].hint;
        }

        localStorage.setItem("merlinSave", JSON.stringify({
            level: currentLevel,
            step: step,
            score: score
        }));

        updateUI();
        inputBox.value = "";
    }
});

function restartGame(){
    localStorage.removeItem("merlinSave");
    location.reload();
}
</script>

</body>
</html>
