<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Merlin Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
  backdrop-filter: blur(10px);
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin: 10px 0;
}

.bar {
  height: 100%;
  background: #00eaff;
  width: 0%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="game">
  <h2>Merlin</h2>

  <button onclick="setLang('ro')">RO</button>
  <button onclick="setLang('en')">EN</button>

  <div id="era"></div>
  <div id="merlin"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div id="path"></div>
  <div id="score"></div>

  <input id="inputBox" placeholder="..." />
  <button onclick="restartGame()">Restart</button>
</div>

<script>
const inputBox = document.getElementById("inputBox");

let lang = "ro";

const texts = {
  ro: {
    guess: "Ghici evoluția...",
    placeholder: "Scrie cuvânt...",
    correct: "Corect!",
    wrong: "Greșit!"
  },
  en: {
    guess: "Guess the evolution...",
    placeholder: "Type word...",
    correct: "Correct!",
    wrong: "Wrong!"
  }
};

let levels = [
  {
    era: "Ancient",
    words: ["fire", "wheel", "metal"]
  },
  {
    era: "Medieval",
    words: ["castle", "sword", "king"]
  },
  {
    era: "Modern",
    words: ["engine", "electricity", "factory"]
  },
  {
    era: "Future",
    words: ["ai", "robot", "space"]
  }
];

let currentLevel = 0;
let step = 0;
let score = 0;

function setLang(l) {
  lang = l;
  updateUI();
}

function updateUI() {
  document.getElementById("era").innerText =
    (lang === "ro" ? "Era: " : "Era: ") + levels[currentLevel].era;

  document.getElementById("merlin").innerText =
    texts[lang].guess;

  document.getElementById("path").innerText =
    (lang === "ro" ? "Progres: " : "Progress: ") +
    step + "/" + levels[currentLevel].words.length;

  document.getElementById("score").innerText =
    "Score: " + score;

  inputBox.placeholder = texts[lang].placeholder;

  let percent = (step / levels[currentLevel].words.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

inputBox.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkAnswer();
  }
});

function checkAnswer() {
  let val = inputBox.value.toLowerCase();

  if (val === levels[currentLevel].words[step]) {
    score++;
    step++;

    if (step >= levels[currentLevel].words.length) {
      currentLevel++;
      step = 0;

      if (currentLevel >= levels.length) {
        alert("GAME COMPLET!");
        inputBox.disabled = true;
        return;
      }
    }
  }

  inputBox.value = "";
  updateUI();
}

function restartGame() {
  currentLevel = 0;
  step = 0;
  score = 0;
  inputBox.disabled = false;
  updateUI();
}

updateUI();
</script>

</body>
</html>
