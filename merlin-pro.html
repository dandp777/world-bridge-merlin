<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Merlin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: #203a43;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
}

button {
  margin: 5px;
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
}
</style>
</head>

<body>

<div class="game">
  <h2>Merlin</h2>

  <div id="era"></div>
  <div id="status"></div>

  <input id="inputBox" placeholder="scrie..." />
</div>

<script>
const input = document.getElementById("inputBox");

let level = 0;
let step = 0;

const levels = [
  ["fire", "wheel", "metal"],
  ["castle", "sword", "king"]
];

function update() {
  document.getElementById("era").innerText =
    "Level: " + (level + 1);

  document.getElementById("status").innerText =
    "Word " + (step + 1) + "/" + levels[level].length;
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {

    let val = input.value.trim().toLowerCase();

    if (val === levels[level][step]) {
      step++;

      if (step === levels[level].length) {
        level++;
        step = 0;

        if (level === levels.length) {
          alert("AI TERMINAT!");
          return;
        }
      }
    } else {
      alert("GRESIT!");
    }

    input.value = "";
    update();
  }
});

update();
</script>

</body>
</html>
