<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Merlin Final</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #00eaff;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin: 10px 0;
}

.bar {
  height: 100%;
  background: #00eaff;
  width: 0%;
}
</style>
</head>

<body>

<div class="game">
  <h2>Merlin</h2>

  <button onclick="setLang('ro')">RO</button>
  <button onclick="setLang('en')">EN</button>

  <div id="era"></div>
  <div id="merlin"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div id="path"></div>
  <div id="score"></div>

  <input id="inputBox" />
  <button onclick="restartGame()">Restart</button>
</div>

<script>
const inputBox = document.getElementById("inputBox");

let lang = "ro";

const texts = {
  ro: {
    guess: "Ghici evoluția...",
    placeholder: "Scrie cuvânt..."
  },
  en: {
    guess: "Guess the evolution...",
    placeholder: "Type word..."
  }
};

const levels = [
  { era: "Ancient", words: ["fire", "wheel", "metal"] },
  { era: "Medieval", words: ["castle", "sword", "king"] },
  { era: "Modern", words: ["engine", "electricity", "factory"] }
];

let currentLevel = 0;
let step = 0;
let score = 0;

function updateUI() {
  document.getElementById("era").innerText =
    "Era: " + levels[currentLevel].era;

  document.getElementById("merlin").innerText =
    texts[lang].guess;

  document.getElementById("path").innerText =
    "Progress: " + step + "/" + levels[currentLevel].words.length;

  document.getElementById("score").innerText =
    "Score: " + score;

  inputBox.placeholder = texts[lang].placeholder;

  let percent = (step / levels[currentLevel].words.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function setLang(l) {
  lang = l;
  updateUI();
}

inputBox.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let val = inputBox.value.trim().toLowerCase();
    let correct = levels[currentLevel].words[step];

    console.log("INPUT:", val);
    console.log("EXPECTED:", correct);

    if (val === correct) {
      score++;
      step++;

      if (step === levels[currentLevel].words.length) {
        currentLevel++;
        step = 0;

        if (currentLevel === levels.length) {
          alert("GAME COMPLET!");
          inputBox.disabled = true;
          return;
        }
      }
    }

    inputBox.value = "";
    updateUI();
  }
});

function restartGame() {
  currentLevel = 0;
  step = 0;
  score = 0;
  inputBox.disabled = false;
  updateUI();
}

updateUI();
</script>

</body>
</html>
