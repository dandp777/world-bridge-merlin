<script>
const inputBox = document.getElementById("inputBox");

const successSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const failSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

let levels = [
    {
        era: "Ancient",
        words: ["fire", "smoke", "magic"],
        hint: "🔥 Gândește evoluția..."
    },
    {
        era: "Medieval",
        words: ["magic", "alchemy", "machine"],
        hint: "⚔️ Din magie spre știință..."
    },
    {
        era: "Modern",
        words: ["machine", "computer", "ai"],
        hint: "💻 Te apropii de viitor..."
    }
];

let currentLevel = 0;
let step = 0;

function updateUI(){
    document.getElementById("era").innerText = "Era: " + levels[currentLevel].era;
    document.getElementById("merlin").innerText = "🧙 Merlin: " + levels[currentLevel].hint;
    document.getElementById("path").innerText = "Progress: " + levels[currentLevel].words.slice(0, step).join(" ➝ ");
}

updateUI();

inputBox.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        let value = inputBox.value.toLowerCase();
        let correctWord = levels[currentLevel].words[step];

        if(value === correctWord){
            successSound.play();
            step++;

            if(step >= levels[currentLevel].words.length){
                currentLevel++;
                step = 0;

                if(currentLevel >= levels.length){
                    document.getElementById("merlin").innerText = "🌌 Ai ajuns în viitor! AI a fost creat!";
                    inputBox.disabled = true;
                    return;
                }
            }

        } else {
            failSound.play();
            document.getElementById("merlin").innerText = "❌ Greșit... " + levels[currentLevel].hint;
        }

        updateUI();
        inputBox.value = "";
    }
});
</script>
