<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Merlin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #00eaff;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin: 10px 0;
}

.bar {
  height: 100%;
  background: #00eaff;
  width: 0%;
}
</style>
</head>

<body>

<div class="game">
  <h2>Merlin</h2>

  <div id="level"></div>
  <div id="progressText"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <input id="inputBox" placeholder="scrie cuvânt" onkeydown="check(event)">
  <button onclick="restart()">Restart</button>

  <div id="msg"></div>
</div>

<script>
let level = 0;
let step = 0;
let score = 0;

const levels = [
  ["fire", "wheel", "metal"],
  ["castle", "sword", "king"],
  ["engine", "electricity", "factory"]
];

function update() {
  document.getElementById("level").innerText =
    "Level: " + (level + 1);

  document.getElementById("progressText").innerText =
    "Word " + (step + 1) + "/" + levels[level].length;

  let percent = (step / levels[level].length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function check(e) {
  if (e.key === "Enter") {

    let input = document.getElementById("inputBox");
    let val = input.value.trim().toLowerCase();

    if (val === levels[level][step]) {
      step++;
      score++;

      document.getElementById("msg").innerText = "Corect!";

      if (step === levels[level].length) {
        level++;
        step = 0;

        if (level === levels.length) {
          document.getElementById("msg").innerText = "AI TERMINAT JOCUL!";
          input.disabled = true;
          return;
        }
      }

    } else {
      document.getElementById("msg").innerText = "Greșit!";
    }

    input.value = "";
    update();
  }
}

function restart() {
  level = 0;
  step = 0;
  score = 0;
  document.getElementById("inputBox").disabled = false;
  document.getElementById("msg").innerText = "";
  update();
}

update();
</script>

</body>
</html>
