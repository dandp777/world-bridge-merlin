<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Merlin PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #00eaff;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.progress {
  height: 8px;
  background: #333;
  border-radius: 10px;
  margin: 10px 0;
}

.bar {
  height: 100%;
  background: #00eaff;
  width: 0%;
  border-radius: 10px;
}

.msg {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="game">
  <h2>Merlin</h2>

  <button onclick="setLang('ro')">RO</button>
  <button onclick="setLang('en')">EN</button>

  <div id="era"></div>
  <div id="hint"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div id="progress"></div>
  <div id="score"></div>

  <input id="inputBox" />
  <button onclick="restartGame()">Restart</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const input = document.getElementById("inputBox");

let lang = "ro";

const texts = {
  ro: {
    hint: "Ghici evoluția...",
    placeholder: "Scrie cuvânt...",
    correct: "Corect!",
    wrong: "Greșit!",
    progress: "Progres"
  },
  en: {
    hint: "Guess the evolution...",
    placeholder: "Type word...",
    correct: "Correct!",
    wrong: "Wrong!",
    progress: "Progress"
  }
};

const levels = [
  { era: "Ancient", words: ["fire", "wheel", "metal"] },
  { era: "Medieval", words: ["castle", "sword", "king"] },
  { era: "Modern", words: ["engine", "electricity", "factory"] }
];

let level = 0;
let step = 0;
let score = 0;

function update() {
  document.getElementById("era").innerText =
    "Era: " + levels[level].era;

  document.getElementById("hint").innerText =
    texts[lang].hint;

  document.getElementById("progress").innerText =
    texts[lang].progress + ": " + step + "/" + levels[level].words.length;

  document.getElementById("score").innerText =
    "Score: " + score;

  input.placeholder = texts[lang].placeholder;

  let percent = (step / levels[level].words.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function setLang(l) {
  lang = l;
  update();
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {

    let val = input.value.trim().toLowerCase();
    let correct = levels[level].words[step];

    if (val === correct) {
      score++;
      step++;

      document.getElementById("msg").innerText = texts[lang].correct;

      if (step === levels[level].words.length) {
        level++;
        step = 0;

        if (level === levels.length) {
          document.getElementById("msg").innerText = "GAME COMPLET!";
          input.disabled = true;
          return;
        }
      }
    } else {
      document.getElementById("msg").innerText = texts[lang].wrong;
    }

    input.value = "";
    update();
  }
});

function restartGame() {
  level = 0;
  step = 0;
  score = 0;
  input.disabled = false;
  document.getElementById("msg").innerText = "";
  update();
}

update();
</script>

</body>
</html>
