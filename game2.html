<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guess Number</title>

<style>
body {
  font-family: Arial;
  background: #1e3c72;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.game {
  background: #2a5298;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<div class="game">
  <h2>Guess the Number</h2>
  <p>1 - 100</p>

  <input id="guess">
  <button onclick="check()">Try</button>

  <p id="msg"></p>
</div>

<script>
let number = Math.floor(Math.random() * 100) + 1;

function check() {
  let val = Number(document.getElementById("guess").value);

  if (val === number) {
    document.getElementById("msg").innerText = "Correct!";
  } else if (val > number) {
    document.getElementById("msg").innerText = "Too big!";
  } else {
    document.getElementById("msg").innerText = "Too small!";
  }
}
</script>

</body>
</html>
