<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>World Bridge Merlin</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: Arial;
  color: white;
}

#inputBox {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  width: 300px;
  outline: none;
}

.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(30,41,59,0.8);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="card">
  <h2 id="era"></h2>
  <p id="merlin"></p>
  <h1 id="path"></h1>
</div>

<input id="inputBox" placeholder="Scrie cuvânt..." />

<script>

let levels = [
{era:"Ancient",start:"fire",goal:"magic",path:["smoke","ritual"]},
{era:"Medieval",start:"magic",goal:"machine",path:["alchemy","science"]},
{era:"Modern",start:"machine",goal:"AI",path:["computer","internet"]}
];

let currentLevel = 0;
let mistakes = 0;

function getMerlinHint() {
  let hints = [
    "Gândește evoluția...",
    "Ce vine după asta?",
    "Folosește logică...",
    "Privește în viitor..."
  ];
  return hints[Math.floor(Math.random() * hints.length)];
}

let level = levels[currentLevel];
let path = [level.start];

const eraText = document.getElementById("era");
const merlinText = document.getElementById("merlin");
const pathText = document.getElementById("path");
const input = document.getElementById("inputBox");

function updateUI() {
  eraText.innerText = "Era: " + level.era;
  pathText.innerText = path.join(" → ");
}

updateUI();
merlinText.innerText = "🧙 Merlin: " + getMerlinHint();

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    check(input.value.toLowerCase());
    input.value = "";
  }
});

function check(word) {
  let expected = level.path[path.length - 1];

  if (word === expected) {
    path.push(word);
    mistakes = 0;
    updateUI();

    if (path.length - 1 === level.path.length) {
      win();
    }

  } else if (word === level.goal.toLowerCase() &&
             path.length - 1 === level.path.length) {

    path.push(word);
    win();

  } else {
    mistakes++;
    merlinText.innerText = "❌ Merlin: Nu... încearcă altceva.";

    if (mistakes >= 2) {
      merlinText.innerText = "💡 Merlin: Hint → " + expected;
    }
  }
}

function win() {
  merlinText.innerText = "✨ Merlin: Ai reușit!";
  setTimeout(() => {
    currentLevel++;
    if (currentLevel >= levels.length) {
      alert("🎉 Ai terminat jocul!");
      location.reload();
    } else {
      level = levels[currentLevel];
      path = [level.start];
      updateUI();
      merlinText.innerText = "🧙 Merlin: Nivel nou!";
    }
  }, 1000);
}

</script>

</body>
</html>
